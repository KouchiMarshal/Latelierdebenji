name: Ajouter Mon compte au menu

on:
  workflow_dispatch: {}

jobs:
  add-menu-item:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/menu
          cat > /tmp/menu/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi

          echo "--- Menus existants ---"
          $WP menu list --fields=term_id,name,locations

          MENU_ID=$($WP eval 'echo get_nav_menu_locations()["primary"] ?? "";')
          echo "--- Menu principal : $MENU_ID ---"

          ACCOUNT_URL=$($WP eval 'echo wc_get_page_permalink( "myaccount" );')
          echo "--- URL mon compte : $ACCOUNT_URL ---"

          EXISTING=$($WP menu item list "$MENU_ID" --fields=title,url --format=csv | grep -i "Mon compte" || true)
          if [ -n "$EXISTING" ]; then
            echo "--- Lien déjà présent, rien à faire ---"
          else
            $WP menu item add-custom "$MENU_ID" "Mon compte" "$ACCOUNT_URL"
            echo "--- Lien ajouté ---"
          fi

          echo "--- Contenu du menu après modification ---"
          $WP menu item list "$MENU_ID" --fields=title,url,position
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/menu/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Ajouter via WP-CLI
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'
