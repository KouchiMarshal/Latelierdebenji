name: Publier les pages légales

on:
  workflow_dispatch: {}

jobs:
  publish-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/legal
          cat > /tmp/legal/publish-pages.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi
          for slug in mentions-legales conditions-generales-de-vente politique-de-confidentialite droit-de-retractation; do
            id=$($WP post list --pagename="$slug" --post_type=page --field=ID --format=ids)
            if [ -n "$id" ]; then
              $WP post update "$id" --post_status=publish
            else
              echo "Introuvable : $slug"
            fi
          done
          rm -f "$HOME/publish-pages.sh"
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/legal/publish-pages.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Publier les pages via WP-CLI
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/publish-pages.sh && sh ~/publish-pages.sh'
