name: Convertir en produit variable

on:
  workflow_dispatch: {}

jobs:
  make-variable:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer les fichiers distants
        run: |
          mkdir -p /tmp/variable

          cat > /tmp/variable/convert.php <<'EOF'
          <?php
          $product_id = 35;

          wp_set_object_terms( $product_id, 'variable', 'product_type' );

          $attribute = new WC_Product_Attribute();
          $attribute->set_id( 0 );
          $attribute->set_name( 'Densité' );
          $attribute->set_options( array( 'Standard', 'Fournie' ) );
          $attribute->set_position( 0 );
          $attribute->set_visible( true );
          $attribute->set_variation( true );

          $product = new WC_Product_Variable( $product_id );
          $product->set_attributes( array( $attribute ) );
          $product->save();

          delete_post_meta( $product_id, '_regular_price' );
          delete_post_meta( $product_id, '_sale_price' );
          delete_post_meta( $product_id, '_price' );

          $prices = array(
              'Standard' => '40.00',
              'Fournie'  => '50.00',
          );

          foreach ( $prices as $option => $price ) {
              $variation = new WC_Product_Variation();
              $variation->set_parent_id( $product_id );
              $variation->set_attributes( array( 'densite' => $option ) );
              $variation->set_regular_price( $price );
              $variation->set_price( $price );
              $variation->set_status( 'publish' );
              $variation->save();
              echo "Variation créée : $option ($price €)\n";
          }

          WC_Product_Variable::sync( $product_id );

          echo "Produit $product_id converti en produit variable.\n";
          EOF

          cat > /tmp/variable/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi
          $WP eval-file "$HOME/convert.php"
          rm -f "$HOME/convert.php" "$HOME/run.sh"
          EOF

      - name: Envoyer les fichiers sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/variable/convert.php /tmp/variable/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Convertir via WP-CLI
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh'
