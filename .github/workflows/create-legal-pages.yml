name: Créer les pages légales

on:
  workflow_dispatch: {}

jobs:
  create-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer les fichiers de contenu
        run: |
          mkdir -p /tmp/legal

          cat > /tmp/legal/mentions-legales.html <<'EOF'
          <h2>Éditeur du site</h2>
          <p>Le site latelierdebenji.fr est édité par :</p>
          <p>
          [Nom Prénom à compléter] — Entrepreneur individuel (micro-entreprise)<br>
          SIRET : [Numéro SIRET à compléter]<br>
          Adresse : [Adresse à compléter]<br>
          Email : [Email à compléter]<br>
          Téléphone : [Téléphone à compléter]
          </p>

          <h2>Hébergement</h2>
          <p>
          Le site est hébergé par :<br>
          OVH SAS<br>
          2 rue Kellermann, 59100 Roubaix, France<br>
          RCS Lille Métropole 424 761 419 00045
          </p>

          <h2>Directeur de la publication</h2>
          <p>[Nom Prénom à compléter]</p>

          <h2>Propriété intellectuelle</h2>
          <p>L'ensemble des contenus présents sur ce site (textes, images, logo) est la propriété de L'Atelier de Benji, sauf mention contraire. Toute reproduction sans autorisation est interdite.</p>

          <p><em>Cette page est un modèle à compléter avec vos informations réelles avant publication.</em></p>
          EOF

          cat > /tmp/legal/cgv.html <<'EOF'
          <h2>Article 1 — Objet</h2>
          <p>Les présentes conditions générales de vente (CGV) régissent les ventes de compositions florales séchées réalisées par [Nom Prénom à compléter] (micro-entreprise, SIRET [à compléter]) via le site latelierdebenji.fr.</p>

          <h2>Article 2 — Prix</h2>
          <p>Les prix des produits sont indiqués en euros (€), toutes taxes comprises (TTC). L'Atelier de Benji se réserve le droit de modifier ses prix à tout moment.</p>

          <h2>Article 3 — Commande</h2>
          <p>Toute commande passée sur le site implique l'acceptation pleine et entière des présentes CGV. Un email de confirmation est envoyé après validation de la commande et du paiement.</p>

          <h2>Article 4 — Paiement</h2>
          <p>Le paiement s'effectue en ligne par carte bancaire via Stripe, de manière sécurisée.</p>

          <h2>Article 5 — Livraison</h2>
          <p>Les délais et frais de livraison sont indiqués lors de la commande. [À compléter : zones de livraison, délais, transporteur].</p>

          <h2>Article 6 — Droit de rétractation</h2>
          <p>Conformément à la loi, le client dispose d'un délai de 14 jours pour exercer son droit de rétractation (voir notre page dédiée). [À vérifier : vos produits sur-mesure/personnalisés peuvent être exclus de ce droit selon l'article L221-28 du Code de la consommation].</p>

          <h2>Article 7 — Garanties</h2>
          <p>Les produits bénéficient de la garantie légale de conformité et de la garantie contre les vices cachés.</p>

          <h2>Article 8 — Responsabilité</h2>
          <p>L'Atelier de Benji ne saurait être tenu responsable des dommages résultant d'une mauvaise utilisation des produits.</p>

          <h2>Article 9 — Litiges et médiation</h2>
          <p>En cas de litige, le client peut recourir gratuitement à un médiateur de la consommation. [Coordonnées du médiateur à compléter]. À défaut de résolution amiable, les tribunaux français seront seuls compétents.</p>

          <p><em>Ce document est un modèle à faire relire et compléter (informations manquantes) avant publication.</em></p>
          EOF

          cat > /tmp/legal/confidentialite.html <<'EOF'
          <h2>Collecte des données</h2>
          <p>Dans le cadre de vos commandes et de votre navigation sur latelierdebenji.fr, nous collectons certaines données personnelles : nom, prénom, adresse postale, email, téléphone, et données de paiement (traitées directement par Stripe, nous n'en conservons aucune trace).</p>

          <h2>Finalités</h2>
          <p>Ces données sont utilisées pour :</p>
          <ul>
          <li>Traiter et livrer vos commandes</li>
          <li>Vous contacter en cas de besoin concernant votre commande</li>
          <li>Respecter nos obligations légales et comptables</li>
          </ul>

          <h2>Base légale</h2>
          <p>Le traitement de vos données repose sur l'exécution du contrat de vente et sur nos obligations légales.</p>

          <h2>Durée de conservation</h2>
          <p>Vos données sont conservées pendant la durée nécessaire au traitement de votre commande, puis archivées conformément aux obligations légales (comptables, notamment).</p>

          <h2>Vos droits</h2>
          <p>Conformément au RGPD, vous disposez d'un droit d'accès, de rectification, d'effacement, de limitation et de portabilité de vos données. Pour exercer ces droits, contactez-nous à : [Email à compléter].</p>

          <h2>Cookies</h2>
          <p>Le site peut utiliser des cookies techniques nécessaires à son fonctionnement (panier, session) et, le cas échéant, des cookies de mesure d'audience. [À compléter si des cookies tiers sont utilisés].</p>

          <h2>Hébergement des données</h2>
          <p>Les données sont hébergées chez OVH SAS, 2 rue Kellermann, 59100 Roubaix, France.</p>

          <p><em>Ce document est un modèle à compléter avec vos informations réelles avant publication.</em></p>
          EOF

          cat > /tmp/legal/retractation.html <<'EOF'
          <h2>Délai de rétractation</h2>
          <p>Conformément aux articles L221-18 et suivants du Code de la consommation, vous disposez d'un délai de 14 jours à compter de la réception de votre commande pour exercer votre droit de rétractation, sans avoir à justifier de motifs ni à payer de pénalités.</p>

          <h2>Exceptions</h2>
          <p>Conformément à l'article L221-28 du Code de la consommation, le droit de rétractation ne s'applique pas aux biens confectionnés selon les spécifications du consommateur ou nettement personnalisés. [À vérifier avec un professionnel si vos compositions sur-mesure entrent dans ce cadre].</p>

          <h2>Comment exercer ce droit ?</h2>
          <p>Pour exercer votre droit de rétractation, vous devez nous notifier votre décision par email à [Email à compléter] ou par courrier à [Adresse à compléter], au moyen d'une déclaration dénuée d'ambiguïté (par exemple le formulaire ci-dessous).</p>

          <h3>Modèle de formulaire de rétractation</h3>
          <p>
          À l'attention de [Nom Prénom à compléter], [Adresse à compléter] :<br><br>
          Je notifie par la présente ma rétractation du contrat portant sur la vente du bien ci-dessous :<br>
          Commandé le : [date]<br>
          Reçu le : [date]<br>
          Nom du consommateur :<br>
          Adresse du consommateur :<br>
          Signature (uniquement en cas de notification papier)<br>
          Date :
          </p>

          <h2>Retour et remboursement</h2>
          <p>Vous devez renvoyer le produit dans les 14 jours suivant la communication de votre décision de rétractation. Les frais de retour sont à votre charge, sauf mention contraire. Le remboursement intervient dans un délai de 14 jours à compter de la réception du produit retourné ou de la preuve d'expédition.</p>

          <p><em>Ce document est un modèle à faire relire et compléter avant publication.</em></p>
          EOF

      - name: Préparer le script distant
        run: |
          cat > /tmp/legal/deploy-pages.sh <<'EOF'
          #!/bin/sh
          set -e
          cd ~/www
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f ~/wp-cli.phar ]; then
              curl -sS -o ~/wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x ~/wp-cli.phar
            fi
            WP="php ~/wp-cli.phar"
          fi
          $WP post create ~/mentions-legales.html --post_title="Mentions légales" --post_type=page --post_status=draft
          $WP post create ~/cgv.html --post_title="Conditions générales de vente" --post_type=page --post_status=draft
          $WP post create ~/confidentialite.html --post_title="Politique de confidentialité" --post_type=page --post_status=draft
          $WP post create ~/retractation.html --post_title="Droit de rétractation" --post_type=page --post_status=draft
          rm -f ~/mentions-legales.html ~/cgv.html ~/confidentialite.html ~/retractation.html ~/deploy-pages.sh
          EOF

      - name: Envoyer les fichiers sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/legal/mentions-legales.html /tmp/legal/cgv.html /tmp/legal/confidentialite.html /tmp/legal/retractation.html /tmp/legal/deploy-pages.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Créer les pages via WP-CLI (brouillons)
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/deploy-pages.sh && sh ~/deploy-pages.sh'
