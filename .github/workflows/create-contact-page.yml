name: Créer la page Contact

on:
  workflow_dispatch: {}

jobs:
  create-page:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/contactpage
          cat > /tmp/contactpage/create-page.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi
          existing=$($WP post list --post_type=page --pagename=contact --field=ID --format=ids || true)
          if [ -n "$existing" ]; then
            id="$existing"
          else
            id=$($WP post create --post_type=page --post_title="Contact" --post_status=publish --porcelain)
          fi
          $WP post meta update "$id" _wp_page_template template-contact.php
          echo "Page Contact ID: $id"
          rm -f "$HOME/create-page.sh"
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/contactpage/create-page.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Créer la page via WP-CLI
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/create-page.sh && sh ~/create-page.sh'
