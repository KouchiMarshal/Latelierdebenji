name: Mettre a jour les descriptions produits

on:
  workflow_dispatch: {}

jobs:
  update-descriptions:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/descs
          cat > /tmp/descs/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi

          cat > /tmp/desc35.txt <<'DESC35'
          Une couronne fleurie unique, façonnée à la main pour célébrer une naissance ou tout autre heureux événement.

          Chaque couronne est composée de fleurs séchées et de verdure stabilisée, choisies et assemblées une à une dans mon atelier, en Normandie. Le prénom est délicatement formé en fil de fer et entouré de fleurs dans la couleur de votre choix, pour une création aussi unique que l'enfant qu'elle célèbre.

          Disponible en deux versions : la version Standard, épurée et délicate, et la version Fournie, plus généreuse en fleurs séchées pour un rendu encore plus habillé.

          Personnalisez votre couronne directement sur cette page : indiquez le texte souhaité (prénom, date, petit mot) et choisissez la couleur de fleurs qui vous ressemble parmi une large palette. Chaque commande est ensuite réalisée sur-mesure, avec le plus grand soin.

          Livrée accompagnée d'un petit ourson en peluche, pour un cadeau prêt à offrir.

          Les fleurs séchées et la verdure stabilisée se conservent naturellement plusieurs années, à l'abri du soleil direct et de l'humidité : un souvenir durable, à l'image du moment qu'il célèbre.
          DESC35

          cat > /tmp/excerpt35.txt <<'EXC35'
          Couronne artisanale en fleurs séchées, personnalisable avec un texte en fil de fer et la couleur de votre choix. Disponible en version Standard ou Fournie. Livrée avec un ourson en peluche.
          EXC35

          cat > /tmp/desc39.txt <<'DESC39'
          Un cadre floral pensé pour sublimer vos plus beaux souvenirs.

          Composé de fleurs séchées, de fougères et de coton stabilisé assemblés à la main, ce cadre entoure votre photo d'un écrin naturel et intemporel, idéal pour immortaliser une naissance, un mariage, un baptême, ou tout autre moment qui compte pour vous.

          Personnalisez votre création directement sur cette page en choisissant un texte (prénom, date, petite dédicace) et la couleur de fleurs qui accompagnera votre photo. Une fois votre commande passée, envoyez-nous simplement la photo de votre choix par email : nous vous recontacterons pour finaliser ensemble la composition avant réalisation.

          Comme toutes mes créations, ce cadre est fait main dans mon atelier en Normandie, avec des fleurs séchées et de la verdure stabilisée qui se conservent naturellement plusieurs années, à l'abri du soleil direct et de l'humidité.
          DESC39

          cat > /tmp/excerpt39.txt <<'EXC39'
          Cadre floral en fleurs séchées, fougères et coton stabilisé, personnalisable avec votre photo, un texte et la couleur de votre choix. Un souvenir durable, fait main en Normandie.
          EXC39

          for f in /tmp/desc35.txt /tmp/excerpt35.txt /tmp/desc39.txt /tmp/excerpt39.txt; do
            sed -i 's/^[[:space:]]*//' "$f"
          done

          echo "--- Mise a jour produit 35 ---"
          $WP post update 35 --post_content="$(cat /tmp/desc35.txt)" --post_excerpt="$(cat /tmp/excerpt35.txt)"

          echo "--- Mise a jour produit 39 ---"
          $WP post update 39 --post_content="$(cat /tmp/desc39.txt)" --post_excerpt="$(cat /tmp/excerpt39.txt)"

          echo "--- Verification produit 35 ---"
          $WP post get 35 --field=post_excerpt
          echo "---"
          $WP post get 35 --field=post_content

          echo "--- Verification produit 39 ---"
          $WP post get 39 --field=post_excerpt
          echo "---"
          $WP post get 39 --field=post_content
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/descs/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Mettre a jour via WP-CLI
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'
