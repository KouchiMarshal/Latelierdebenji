name: Diagnostiquer la mise en page Mon compte

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/diag2
          cat > /tmp/diag2/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"

          echo "--- Arborescence complete sous wp-content/themes ---"
          find wp-content/themes -maxdepth 8 2>/dev/null || true

          echo "--- Toutes les occurrences de style.css sous atelier-benji ---"
          find wp-content/themes -name "style.css" -exec sh -c 'echo "=== {} ==="; grep -i "^Version:" "{}"; stat -c "%y %n" "{}"' \; 2>/dev/null || true

          echo "--- Toutes les occurrences de main.css sous atelier-benji ---"
          find wp-content/themes -name "main.css" -exec sh -c 'echo "=== {} ==="; wc -l "{}"; grep -c "Mon compte" "{}"; stat -c "%y %n" "{}"' \; 2>/dev/null || true

          echo "--- Theme actif selon WordPress (wp_options) ---"
          if command -v wp >/dev/null 2>&1; then
            wp option get stylesheet
            wp option get template
          else
            grep -o "template.\{0,80\}" wp-content/*.php 2>/dev/null | head -n1 || true
          fi
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/diag2/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Diagnostiquer
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'
