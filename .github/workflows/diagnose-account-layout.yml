name: Diagnostiquer la mise en page Mon compte

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/diag2
          cat > /tmp/diag2/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"

          CSS_PATH="wp-content/themes/atelier-benji/assets/css/main.css"
          STYLE_PATH="wp-content/themes/atelier-benji/style.css"

          echo "--- Version dans style.css sur le serveur ---"
          grep -i "^Version:" "$STYLE_PATH" || true

          echo "--- Taille de main.css sur le serveur ---"
          wc -l "$CSS_PATH" || true

          echo "--- Présence de la section Mon compte dans main.css ---"
          grep -n "Mon compte" "$CSS_PATH" || echo "NON TROUVE"

          echo "--- Règle .woocommerce-account (bloc complet) ---"
          awk '/^\.woocommerce-account \{/{p=1} p{print} /^\}/{if(p){exit}}' "$CSS_PATH" || true

          echo "--- Règle .woocommerce-MyAccount-navigation (premier bloc) ---"
          grep -A6 "^\.woocommerce-MyAccount-navigation {" "$CSS_PATH" | head -n8 || true

          echo "--- Vérifier accolades équilibrées dans main.css ---"
          OPEN=$(grep -o "{" "$CSS_PATH" | wc -l)
          CLOSE=$(grep -o "}" "$CSS_PATH" | wc -l)
          echo "Ouvertures: $OPEN / Fermetures: $CLOSE"
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/diag2/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Diagnostiquer
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'
