name: Diagnostiquer la mise en page Mon compte

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/diag2
          cat > /tmp/diag2/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"

          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi

          echo "--- Theme actif selon WordPress (wp_options) ---"
          $WP option get stylesheet
          $WP option get template

          echo "--- Rendu HTML reel du shortcode [woocommerce_my_account] (page Commandes) ---"
          $WP eval '
            if ( ! is_user_logged_in() ) {
              $users = get_users( array( "role" => "administrator", "number" => 1 ) );
              if ( $users ) { wp_set_current_user( $users[0]->ID ); }
            }
            $_GET = array();
            $GLOBALS["wp_query"] = new WP_Query();
            echo do_shortcode( "[woocommerce_my_account]" );
          ' 2>&1 | tr -d "\t" | grep -o "<nav[^L]*woocommerce-MyAccount-content[^>]*>" | head -c 2000 || true

          echo "--- Rendu brut (2500 premiers caracteres) ---"
          $WP eval '
            if ( ! is_user_logged_in() ) {
              $users = get_users( array( "role" => "administrator", "number" => 1 ) );
              if ( $users ) { wp_set_current_user( $users[0]->ID ); }
            }
            echo do_shortcode( "[woocommerce_my_account]" );
          ' 2>&1 | head -c 2500 || true
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/diag2/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Diagnostiquer
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'
