name: Ajouter les exemples de composition a la couronne

on:
  workflow_dispatch: {}

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/descupdate
          cat > /tmp/descupdate/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi

          cat > /tmp/desc35.txt <<'DESC35'
          Une couronne fleurie unique, façonnée à la main pour célébrer une naissance ou tout autre heureux événement.

          Chaque couronne est composée de fleurs séchées et de verdure stabilisée, choisies et assemblées une à une dans mon atelier, en Normandie. Elle est disponible en cinq tailles de cerceau (30 cm, 40 cm, 50 cm, 80 cm et 1 m), pour s'adapter à toutes les envies et tous les espaces.

          Personnalisez votre création directement sur cette page :
          - le prénom en fil de fer, en petit (1 ligne) ou grand (2 lignes) format ;
          - une peluche à accrocher (ourson ou lapin) ;
          - la couleur des fleurs séchées ;
          - la couleur et la matière (jute ou satin) du nœud.

          À titre d'exemple, les photos ci-dessus montrent deux réalisations :
          - Couronne « Romane » : cerceau 30 cm, couleurs saumon, vert, blanc et rose, avec option peluche ourson et prénom en petit format.
          - Couronne « Marceau » : cerceau 50 cm, couleurs naturel, vert et blanc, avec option peluche ourson et prénom en petit format.

          Chaque commande est ensuite réalisée sur-mesure, avec le plus grand soin.

          Les fleurs séchées et la verdure stabilisée se conservent naturellement plusieurs années, à l'abri du soleil direct et de l'humidité : un souvenir durable, à l'image du moment qu'il célèbre.
          DESC35

          sed -i 's/^[[:space:]]*//' /tmp/desc35.txt

          echo "--- Mise a jour de la description ---"
          $WP post update 35 --post_content="$(cat /tmp/desc35.txt)"

          echo "--- Verification ---"
          $WP post get 35 --field=post_content
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/descupdate/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Mettre a jour via WP-CLI
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'
