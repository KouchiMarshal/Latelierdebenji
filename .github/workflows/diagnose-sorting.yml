name: Diagnostiquer le tri boutique

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/diag
          cat > /tmp/diag/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi

          echo "--- Plugins actifs ---"
          $WP plugin list --status=active --fields=name,status,version

          echo "--- Structure des permaliens ---"
          $WP option get permalink_structure

          echo "--- Page boutique (option woocommerce_shop_page_id) ---"
          $WP option get woocommerce_shop_page_id

          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/diag/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Diagnostiquer via WP-CLI
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'

      - name: Comparer l'ordre des produits selon le tri (depuis le runner, en HTTPS public)
        if: always()
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36"

          echo "--- Tri par défaut ---"
          curl -s -A "$UA" "https://latelierdebenji.fr/boutique/" -o /tmp/default.html -w "HTTP %{http_code}\n"
          grep -o '<h2 class="woocommerce-loop-product__title">[^<]*' /tmp/default.html || true
          grep -o 'class="woocommerce-ordering"[^>]*>' /tmp/default.html || true
          grep -o '<option value="[^"]*" selected[^>]*>[^<]*' /tmp/default.html || true

          echo "--- Tri prix croissant ---"
          curl -s -A "$UA" "https://latelierdebenji.fr/boutique/?orderby=price" -o /tmp/asc.html -w "HTTP %{http_code}\n"
          grep -o '<h2 class="woocommerce-loop-product__title">[^<]*' /tmp/asc.html || true

          echo "--- Tri prix décroissant ---"
          curl -s -A "$UA" "https://latelierdebenji.fr/boutique/?orderby=price-desc" -o /tmp/desc.html -w "HTTP %{http_code}\n"
          grep -o '<h2 class="woocommerce-loop-product__title">[^<]*' /tmp/desc.html || true

          echo "--- Formulaire de tri (HTML brut, premiers 2000 caractères après woocommerce-ordering) ---"
          grep -o 'woocommerce-ordering.\{0,2000\}' /tmp/default.html | head -c 2000 || true
