name: Recuperer les infos produits

on:
  workflow_dispatch: {}

jobs:
  get-info:
    runs-on: ubuntu-latest
    steps:
      - name: Installer sshpass
        run: sudo apt-get update -y >/dev/null && sudo apt-get install -y sshpass >/dev/null

      - name: Préparer le script distant
        run: |
          mkdir -p /tmp/getinfo
          cat > /tmp/getinfo/run.sh <<'EOF'
          #!/bin/sh
          set -e
          cd "$HOME/www"
          if command -v wp >/dev/null 2>&1; then
            WP="wp"
          else
            if [ ! -f "$HOME/wp-cli.phar" ]; then
              curl -sS -o "$HOME/wp-cli.phar" https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x "$HOME/wp-cli.phar"
            fi
            WP="php $HOME/wp-cli.phar"
          fi

          echo "--- Liste des produits ---"
          $WP post list --post_type=product --fields=ID,post_title,post_status --format=table

          for id in $($WP post list --post_type=product --field=ID); do
            echo "=== Produit $id ==="
            $WP post get "$id" --field=post_title
            echo "--- Prix ---"
            $WP post meta get "$id" _price 2>/dev/null || true
            $WP post meta get "$id" _regular_price 2>/dev/null || true
            echo "--- Type produit ---"
            $WP post term list "$id" product_type --field=name 2>/dev/null || true
            echo "--- Categories ---"
            $WP post term list "$id" product_cat --field=name 2>/dev/null || true
            echo "--- Description courte (excerpt) ---"
            $WP post get "$id" --field=post_excerpt
            echo "--- Description longue (content) ---"
            $WP post get "$id" --field=post_content
            echo ""
          done
          EOF

      - name: Envoyer le script sur le serveur
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -P 22 \
            /tmp/getinfo/run.sh \
            "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}:~/"

      - name: Recuperer les infos
        run: |
          sshpass -p "${{ secrets.OVH_FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.OVH_FTP_USERNAME }}@${{ secrets.OVH_FTP_SERVER }}" 'chmod +x ~/run.sh && sh ~/run.sh && rm -f ~/run.sh'
